<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>%WEB_TITLE%</title>

    <script>
      (function () {
        var ua = navigator.userAgent;
        if (!/KAKAOTALK/i.test(ua)) return;

        if (/Android/i.test(ua)) {
          // Android: 크롬으로 강제 오픈
          location.href =
            'intent://' +
            location.href.replace(/https?:\/\//, '') +
            '#Intent;scheme=https;package=com.android.chrome;end;';
        } else {
          // iOS: 강제 불가 → 안내 오버레이 표시
          document.addEventListener('DOMContentLoaded', function () {
            var el = document.createElement('div');
            el.id = 'kakao-overlay';
            el.style.cssText =
              'position:fixed;top:0;left:0;right:0;bottom:0;' +
              'background:rgba(0,0,0,0.82);z-index:99999;' +
              'display:flex;align-items:center;justify-content:center;padding:32px;box-sizing:border-box;';
            el.innerHTML =
              '<div style="background:#fff;border-radius:20px;padding:28px 24px;' +
              'max-width:320px;width:100%;text-align:center;">' +
              '<div style="font-size:44px;margin-bottom:16px;">🌐</div>' +
              '<p style="font-size:17px;font-weight:700;color:#111;margin:0 0 10px;">Safari에서 열어주세요</p>' +
              '<p style="font-size:13px;color:#888;margin:0 0 20px;line-height:1.7;">' +
              '카카오톡 브라우저에서는<br>일부 기능이 제한됩니다.</p>' +
              '<div style="background:#f2f4f6;border-radius:12px;padding:12px 16px;margin-bottom:20px;text-align:left;">' +
              '<p style="font-size:13px;color:#555;margin:0;line-height:1.8;">' +
              '① 우측 하단 <b>···</b> 탭<br>' +
              '② <b>기본 브라우저로 열기</b> 선택</p>' +
              '</div>' +
              '<button onclick="document.getElementById(\'kakao-overlay\').remove()" ' +
              'style="width:100%;padding:14px;background:#f2f4f6;border:none;' +
              'border-radius:12px;font-size:14px;color:#666;font-weight:600;cursor:pointer;">' +
              '그냥 계속하기</button>' +
              '</div>';
            document.body.appendChild(el);
          });
        }
      })();
    </script>

    <style id="expo-reset">
      html, body { height: 100%; }
      body { overflow: hidden; }
      #root { display: flex; height: 100%; flex: 1; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
